<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="description" content="MV Imóveis — imobiliária de alto padrão em Joinville, Santa Catarina. Apartamentos de luxo, terrenos industriais estratégicos e consultoria imobiliária para investidores no Brasil e no exterior."/>
<meta name="keywords" content="imobiliária de alto padrão no Brasil, imóveis de luxo no Brasil, comprar imóvel no Brasil, investir em imóveis no Brasil, imóveis para investimento no Brasil, consultoria imobiliária para investidores, terrenos industriais Joinville, imóveis de alto padrão Joinville, imóveis de luxo Santa Catarina, imóveis para brasileiros no exterior, patrimônio imobiliário no Brasil"/>
<meta name="author" content="MV Imóveis Joinville — Marcel Vicentini"/>
<meta name="robots" content="index, follow"/>
<meta property="og:title" content="MV Imóveis — Imóveis de Alto Padrão e Investimento Imobiliário no Brasil"/>
<meta property="og:description" content="Apartamentos de luxo, terrenos industriais estratégicos e consultoria imobiliária para investidores. Joinville, Santa Catarina."/>
<meta property="og:type" content="website"/>
<title>MV Imóveis Joinville | Imóveis de Alto Padrão e Investimento Imobiliário no Brasil</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#C9A84C;--gold-light:#E8C96A;--dark:#0D1B2A;
  --white:#FFFFFF;--gray:#F5F5F5;--gray2:#E0E0E0;
  --text:#333333;--text-light:#666666;
  --font-heading:'Playfair Display',serif;--font-body:'Inter',sans-serif;
  --transition:0.3s ease;--shadow:0 4px 24px rgba(0,0,0,0.10);
  --shadow-hover:0 8px 40px rgba(0,0,0,0.18)
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);color:var(--text);background:var(--white);line-height:1.6;overflow-x:hidden}
img{max-width:100%;display:block}
a{text-decoration:none;color:inherit}
ul{list-style:none}
.container{width:90%;max-width:1200px;margin:0 auto}
.section-title{font-family:var(--font-heading);font-size:clamp(1.8rem,4vw,2.8rem);color:var(--dark);margin-bottom:0.5rem}
.section-subtitle{color:var(--text-light);font-size:1rem;margin-bottom:2rem;max-width:640px}
.gold-line{width:60px;height:3px;background:var(--gold);margin:0.8rem 0 1.5rem}
.btn{display:inline-block;padding:0.85rem 2rem;border-radius:4px;font-weight:600;font-size:0.95rem;cursor:pointer;transition:var(--transition);border:none;letter-spacing:0.5px}
.btn-gold{background:var(--gold);color:var(--dark)}
.btn-gold:hover{background:var(--gold-light);transform:translateY(-2px);box-shadow:0 6px 20px rgba(201,168,76,0.4)}
.btn-outline{background:transparent;color:var(--white);border:2px solid var(--gold)}
.btn-outline:hover{background:var(--gold);color:var(--dark)}
[data-lang]{display:none}
[data-lang].active{display:block}
.lang-switcher{display:flex;gap:0.5rem;align-items:center}
.lang-btn{background:transparent;border:1px solid rgba(255,255,255,0.3);color:var(--white);padding:0.3rem 0.7rem;border-radius:3px;cursor:pointer;font-size:0.8rem;font-weight:500;transition:var(--transition)}
.lang-btn:hover,.lang-btn.active{background:var(--gold);border-color:var(--gold);color:var(--dark)}
.navbar{position:fixed;top:0;left:0;right:0;z-index:1000;padding:1.2rem 0;transition:var(--transition);background:transparent}
.navbar.scrolled{background:var(--dark);padding:0.8rem 0;box-shadow:0 2px 20px rgba(0,0,0,0.3)}
.navbar .container{display:flex;align-items:center;justify-content:space-between}
.logo{font-family:var(--font-heading);font-size:1.6rem;color:var(--white);display:flex;flex-direction:column;line-height:1.1}
.logo span{font-size:0.65rem;letter-spacing:3px;color:var(--gold);font-family:var(--font-body);font-weight:500;text-transform:uppercase}
.nav-links{display:flex;gap:2rem;align-items:center}
.nav-links a{color:rgba(255,255,255,0.85);font-size:0.9rem;font-weight:500;transition:var(--transition);position:relative}
.nav-links a::after{content:'';position:absolute;bottom:-3px;left:0;width:0;height:2px;background:var(--gold);transition:var(--transition)}
.nav-links a:hover{color:var(--white)}
.nav-links a:hover::after{width:100%}
.nav-right{display:flex;align-items:center;gap:1.5rem}
.hamburger{display:none;flex-direction:column;gap:5px;cursor:pointer;background:none;border:none;padding:4px}
.hamburger span{display:block;width:24px;height:2px;background:var(--white);transition:var(--transition)}
.hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
.hamburger.open span:nth-child(2){opacity:0}
.hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}
.mobile-menu{display:none;flex-direction:column;background:var(--dark);padding:1.5rem 5%;gap:1.2rem}
.mobile-menu.open{display:flex}
.mobile-menu a{color:rgba(255,255,255,0.85);font-size:1rem;font-weight:500;border-bottom:1px solid rgba(255,255,255,0.08);padding-bottom:0.8rem}
.hero{min-height:100vh;background:linear-gradient(135deg,rgba(13,27,42,0.88) 0%,rgba(13,27,42,0.65) 100%),url('https://images.unsplash.com/photo-1582407947304-fd86f028f716?w=1600&q=80') center/cover no-repeat;display:flex;align-items:center;text-align:center;color:var(--white);padding:8rem 0 4rem}
.hero-content{max-width:820px;margin:0 auto}
.hero-badge{display:inline-block;background:rgba(201,168,76,0.15);border:1px solid var(--gold);color:var(--gold);padding:0.4rem 1.2rem;border-radius:50px;font-size:0.8rem;letter-spacing:2px;text-transform:uppercase;font-weight:600;margin-bottom:1.5rem}
.hero h1{font-family:var(--font-heading);font-size:clamp(2.2rem,5.5vw,4rem);line-height:1.15;margin-bottom:1.2rem}
.hero h1 em{color:var(--gold);font-style:normal}
.hero p{font-size:clamp(1rem,2vw,1.15rem);color:rgba(255,255,255,0.82);margin-bottom:2.5rem;max-width:640px;margin-left:auto;margin-right:auto}
.hero-btns{display:flex;gap:1rem;justify-content:center;flex-wrap:wrap}
.hero-stats{display:flex;justify-content:center;gap:3rem;margin-top:4rem;flex-wrap:wrap}
.stat{text-align:center}
.stat-number{font-family:var(--font-heading);font-size:2.2rem;color:var(--gold);font-weight:700}
.stat-label{font-size:0.8rem;color:rgba(255,255,255,0.65);letter-spacing:1px;text-transform:uppercase}
#sobre{padding:6rem 0;background:var(--white)}
.about-grid{display:grid;grid-template-columns:1fr 1fr;gap:4rem;align-items:center}
.about-image-wrap{position:relative}
.about-image-wrap img{width:100%;border-radius:8px;object-fit:cover;height:480px}
.about-badge-float{position:absolute;bottom:-1.5rem;right:-1.5rem;background:var(--gold);color:var(--dark);padding:1.5rem;border-radius:8px;text-align:center;box-shadow:var(--shadow)}
.about-badge-float strong{display:block;font-family:var(--font-heading);font-size:2.2rem}
.about-badge-float span{font-size:0.75rem;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.about-flags{display:flex;gap:0.8rem;margin-top:1.5rem;flex-wrap:wrap}
.flag-tag{display:flex;align-items:center;gap:0.5rem;background:var(--gray);padding:0.5rem 1rem;border-radius:50px;font-size:0.85rem;font-weight:500;color:var(--dark)}
#servicos{padding:6rem 0;background:var(--gray)}
.services-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:2rem}
.service-card{background:var(--white);border-radius:10px;padding:2.5rem 2rem;box-shadow:var(--shadow);transition:var(--transition);border-top:3px solid transparent}
.service-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-hover);border-top-color:var(--gold)}
.service-icon{font-size:2.8rem;margin-bottom:1.2rem;display:block}
.service-card h3{font-family:var(--font-heading);font-size:1.3rem;color:var(--dark);margin-bottom:0.8rem}
.service-card p{color:var(--text-light);font-size:0.92rem;line-height:1.7}
#imoveis{padding:6rem 0;background:var(--white)}
.properties-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(320px,1fr));gap:2rem}
.property-card{border-radius:10px;overflow:hidden;box-shadow:var(--shadow);transition:var(--transition);background:var(--white);cursor:pointer}
.property-card:hover{transform:translateY(-6px);box-shadow:var(--shadow-hover)}
.property-img{position:relative;height:230px;overflow:hidden}
.property-img img{width:100%;height:100%;object-fit:cover;transition:transform 0.5s ease}
.property-card:hover .property-img img{transform:scale(1.06)}
.property-tag{position:absolute;top:1rem;left:1rem;background:var(--gold);color:var(--dark);padding:0.3rem 0.9rem;border-radius:50px;font-size:0.75rem;font-weight:700;text-transform:uppercase}
.property-body{padding:1.5rem}
.property-body h3{font-family:var(--font-heading);font-size:1.2rem;color:var(--dark);margin-bottom:0.4rem}
.property-location{font-size:0.85rem;color:var(--text-light);margin-bottom:1rem}
.property-price{font-size:1.4rem;font-weight:700;color:var(--gold);font-family:var(--font-heading);margin-bottom:1rem}
.property-features{display:flex;gap:1rem;font-size:0.82rem;color:var(--text-light);border-top:1px solid var(--gray2);padding-top:1rem;flex-wrap:wrap}
.property-cta{display:inline-block;margin-top:1rem;padding:0.5rem 1.2rem;background:var(--gold);color:var(--dark);border-radius:4px;font-size:0.85rem;font-weight:600}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.75);z-index:2000;align-items:center;justify-content:center;padding:1rem}
.modal-overlay.open{display:flex}
.modal-box{background:var(--white);border-radius:12px;max-width:780px;width:100%;max-height:90vh;overflow-y:auto;position:relative;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
.modal-close{position:absolute;top:1rem;right:1rem;background:var(--gold);border:none;color:var(--dark);width:36px;height:36px;border-radius:50%;font-size:1.2rem;cursor:pointer;font-weight:700;z-index:10}
.modal-img{width:100%;height:280px;object-fit:cover;border-radius:12px 12px 0 0}
.modal-content{padding:2rem}
.modal-tag{display:inline-block;background:var(--gold);color:var(--dark);padding:0.3rem 0.9rem;border-radius:50px;font-size:0.75rem;font-weight:700;text-transform:uppercase;margin-bottom:1rem}
.modal-title{font-family:var(--font-heading);font-size:1.8rem;color:var(--dark);margin-bottom:0.5rem}
.modal-location{font-size:0.9rem;color:var(--text-light);margin-bottom:1rem}
.modal-price{font-size:2rem;font-weight:700;color:var(--gold);font-family:var(--font-heading);margin-bottom:1.5rem}
.modal-features{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:1rem;margin-bottom:1.5rem}
.modal-feat{background:var(--gray);padding:0.8rem;border-radius:8px;text-align:center;font-size:0.85rem;color:var(--dark);font-weight:500}
.modal-feat span{display:block;font-size:1.2rem;margin-bottom:0.3rem}
.modal-desc{color:var(--text-light);line-height:1.8;margin-bottom:1.5rem;font-size:0.95rem}
.modal-actions{display:flex;gap:1rem;flex-wrap:wrap}
.modal-actions a{flex:1;text-align:center;padding:0.85rem 1.5rem;border-radius:6px;font-weight:600;font-size:0.95rem;transition:var(--transition)}
.modal-wa{background:#25D366;color:var(--white)}
.modal-contact{background:var(--gold);color:var(--dark)}
#regioes{padding:5rem 0;background:var(--dark);color:var(--white)}
.regions-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1.5rem;margin-top:2rem}
.region-card{background:rgba(255,255,255,0.05);border:1px solid rgba(201,168,76,0.2);border-radius:8px;padding:1.8rem;text-align:center;transition:var(--transition)}
.region-card:hover{background:rgba(201,168,76,0.1);border-color:var(--gold)}
.region-card h3{font-family:var(--font-heading);font-size:1.15rem;margin-bottom:0.4rem}
.region-card p{font-size:0.82rem;color:rgba(255,255,255,0.55)}
.region-icon{font-size:2rem;margin-bottom:0.8rem}
#parceiros{padding:4rem 0;background:var(--gray)}
.parceiros-wrap{display:flex;gap:2rem;flex-wrap:wrap;align-items:center;justify-content:center;margin-top:2rem}
.parceiro-card{background:var(--white);border-radius:10px;padding:1.5rem 2rem;box-shadow:var(--shadow);text-align:center;min-width:220px}
.parceiro-card a{color:var(--gold);font-weight:600;font-size:1rem}
.parceiro-card p{font-size:0.82rem;color:var(--text-light);margin-top:0.4rem}
#contato{padding:6rem 0;background:var(--white)}
.contact-grid{display:grid;grid-template-columns:1fr 1.4fr;gap:4rem;align-items:start}
.contact-info h3{font-family:var(--font-heading);font-size:1.5rem;color:var(--dark);margin-bottom:1.5rem}
.contact-item{display:flex;gap:1rem;align-items:flex-start;margin-bottom:1.5rem}
.contact-icon{width:44px;height:44px;background:var(--gold);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}
.contact-item-text strong{display:block;font-size:0.9rem;color:var(--dark);margin-bottom:0.2rem}
.contact-item-text span,.contact-item-text a{font-size:0.88rem;color:var(--text-light)}
.contact-item-text a:hover{color:var(--gold)}
.contact-form{background:var(--gray);padding:2.5rem;border-radius:10px;box-shadow:var(--shadow)}
.contact-form h3{font-family:var(--font-heading);font-size:1.4rem;color:var(--dark);margin-bottom:1.5rem}
.form-group{margin-bottom:1.2rem}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
.form-group label{display:block;font-size:0.85rem;font-weight:600;color:var(--dark);margin-bottom:0.4rem}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.8rem 1rem;border:1.5px solid var(--gray2);border-radius:6px;font-family:var(--font-body);font-size:0.9rem;color:var(--text);transition:var(--transition);background:var(--white)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:var(--gold);box-shadow:0 0 0 3px rgba(201,168,76,0.15)}
.form-group textarea{resize:vertical;min-height:110px}
.form-submit{width:100%;padding:1rem;font-size:1rem;margin-top:0.5rem}
footer{background:var(--dark);color:rgba(255,255,255,0.7);padding:3.5rem 0 1.5rem}
.footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr;gap:3rem;margin-bottom:3rem}
.footer-brand p{font-size:0.88rem;line-height:1.7;margin-top:1rem;max-width:300px}
.footer-links h4,.footer-contact-f h4{font-family:var(--font-heading);color:var(--white);margin-bottom:1rem;font-size:1.05rem}
.footer-links ul,.footer-contact-f ul{display:flex;flex-direction:column;gap:0.6rem}
.footer-links a{font-size:0.88rem;transition:var(--transition)}
.footer-links a:hover{color:var(--gold)}
.footer-contact-f li{font-size:0.88rem;display:flex;align-items:flex-start;gap:0.5rem}
.footer-bottom{border-top:1px solid rgba(255,255,255,0.08);padding-top:1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;font-size:0.82rem}
.scroll-top{position:fixed;bottom:2rem;right:2rem;width:46px;height:46px;background:var(--gold);color:var(--dark);border:none;border-radius:50%;font-size:1.2rem;cursor:pointer;opacity:0;transform:translateY(20px);transition:var(--transition);z-index:999}
.scroll-top.visible{opacity:1;transform:translateY(0)}
.whatsapp-float{position:fixed;bottom:2rem;left:2rem;background:#25D366;color:white;width:54px;height:54px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:1.6rem;box-shadow:0 4px 16px rgba(37,211,102,0.4);z-index:999;transition:var(--transition);text-decoration:none}
.whatsapp-float:hover{transform:scale(1.1)}
.fade-in{opacity:0;transform:translateY(30px);transition:opacity 0.7s ease,transform 0.7s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}
@media(max-width:900px){.about-grid{grid-template-columns:1fr}.about-image-wrap{display:none}.contact-grid{grid-template-columns:1fr}.footer-grid{grid-template-columns:1fr 1fr}.nav-links{display:none}.hamburger{display:flex}}
@media(max-width:600px){.hero-stats{gap:1.5rem}.footer-grid{grid-template-columns:1fr}.form-row{grid-template-columns:1fr}.footer-bottom{flex-direction:column;text-align:center}.about-badge-float{display:none}}
</style>
</head>
<body>

<nav class="navbar" id="navbar">
<div class="container">
  <a href="#hero" class="logo">MV Imóveis<span>Joinville · Santa Catarina</span></a>
  <ul class="nav-links">
    <li><a href="#sobre"><span data-lang="pt" class="active">Sobre</span><span data-lang="en">About</span><span data-lang="fr">À Propos</span></a></li>
    <li><a href="#servicos"><span data-lang="pt" class="active">Serviços</span><span data-lang="en">Services</span><span data-lang="fr">Services</span></a></li>

    <li><a href="#contato"><span data-lang="pt" class="active">Contato</span
